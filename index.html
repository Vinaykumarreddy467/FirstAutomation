<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Realty Group - Lead Capture</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #334155;
            --border: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background-color: var(--border);
            z-index: 1;
        }

        .divider span {
            background-color: var(--card-bg);
            padding: 0 15px;
            position: relative;
            z-index: 2;
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #statusMessage {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .success { background-color: #dcfce7; color: #166534; }
        .error { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Apex Realty Lead Capture</h2>
    
    <form id="leadForm">
        <!-- Structured Fields -->
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Sarah Jenkins">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="sarah@example.com">
        </div>

        <div class="form-group">
            <label for="budget">Max Budget ($)</label>
            <input type="text" id="budget" name="budget" placeholder="e.g., $1.2M">
        </div>

        <div class="form-group">
            <label for="location">Desired Location</label>
            <input type="text" id="location" name="location" placeholder="e.g., Downtown Boston">
        </div>

        <div class="form-group">
            <label for="urgency">Timeline / Urgency</label>
            <input type="text" id="urgency" name="urgency" placeholder="e.g., Within 2-3 weeks">
        </div>

        <!-- Optional Raw Text Fallback -->
        <div class="divider">
            <span>OR</span>
        </div>

        <div class="form-group">
            <label for="raw_text">Paste Raw Lead Paragraph</label>
            <textarea id="raw_text" name="raw_text" placeholder="Hey! My name is Sarah Jenkins. Me and my husband are looking to move ASAP..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Submit Lead</button>
        <div id="statusMessage"></div>
    </form>
</div>

<script>
    // 1. REPLACE THIS URL WITH YOUR ACTUAL ACTIVEPIECES WEBHOOK URL
    const WEBHOOK_URL = 'https://cloud.activepieces.com/api/v1/webhooks/bpkwFm1pdh2weyENCbcxs';

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        // Disable button while processing
        submitBtn.disabled = true;
        submitBtn.innerText = 'Processing...';
        statusMessage.style.display = 'none';

        // Extract values from form
        const payload = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            budget: document.getElementById('budget').value.trim(),
            location: document.getElementById('location').value.trim(),
            urgency: document.getElementById('urgency').value.trim(),
            raw_text: document.getElementById('raw_text').value.trim()
        };

        try {
            // Send POST request to Activepieces Catch Webhook
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                statusMessage.className = 'success';
                statusMessage.innerText = 'Success! Lead data sent to automation.';
                statusMessage.style.display = 'block';
                document.getElementById('leadForm').reset();
            } else {
                throw new Error(`Server responded with status: ${response.status}`);
            }
        } catch (error) {
            statusMessage.className = 'error';
            statusMessage.innerText = 'Failed to submit lead. Check Webhook URL setup.';
            statusMessage.style.display = 'block';
            console.error('Automation Error:', error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Submit Lead';
        }
    });
</script>

</body>
</html>
