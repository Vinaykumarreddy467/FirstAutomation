<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get In Touch - AI Automation Services</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      max-width: 600px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 30px 40px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 16px;
    }

    .form-container {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .success {
      display: none;
      background: #d1fae5;
      color: #065f46;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-top: 20px;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Let's Build Something Great</h1>
      <p>Tell us about your AI automation needs</p>
    </div>

    <div class="form-container">
      <form id="leadForm">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Business Email *</label>
          <input type="email" id="email" required placeholder="john@company.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210">
        </div>

        <div class="form-group">
          <label for="message">Your Requirements / Message *</label>
          <textarea id="message" required placeholder="I'm looking for AI solutions to automate lead generation for my business in Bengaluru..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Submit Inquiry</button>
      </form>

      <div class="loading" id="loading">Processing your request...</div>
      <div class="success" id="success">✅ Thank you! Your inquiry has been received. We'll get back to you soon.</div>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://cloud.activepieces.com/api/v1/webhooks/bpkwFm1pdh2weyENCbcxs";

    const form = document.getElementById('leadForm');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const success = document.getElementById('success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Disable button and show loading
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";
      loading.style.display = "block";

      const formData = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        message: document.getElementById('message').value.trim(),
        timestamp: new Date().toISOString(),
        source: "GitHub Pages Lead Form"
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          // Show success message
          form.style.display = "none";
          success.style.display = "block";
        } else {
          alert("Failed to submit. Please try again.");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Connection error. Please check your internet and try again.");
      } finally {
        // Reset button
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Inquiry";
        loading.style.display = "none";
      }
    });
  </script>
</body>
</html>
